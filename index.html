<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة مهام محمد | الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #1a1a26;
            --accent: #6c63ff;
            --text: #e8e8f0;
            --danger: #ff6584;
        }

        body {
            font-family: 'Almarai', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 50px;
        }

        .container {
            background: var(--card);
            width: 90%;
            max-width: 400px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid rgba(108,99,255,0.1);
        }

        h2 { text-align: center; margin-bottom: 25px; color: var(--accent); font-weight: 700; }

        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #0f0f1a;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); }

        button#add-btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button#add-btn:hover { opacity: 0.8; transform: scale(1.05); }

        ul { list-style: none; padding: 0; }

        li {
            background: rgba(255,255,255,0.05);
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.02);
            transition: 0.3s;
        }

        li.checked span {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .delete-btn {
            color: var(--danger);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 5px;
        }

        .task-text { flex: 1; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>مهامي الذكية 🚀</h2>
    <div class="input-box">
        <input type="text" id="taskInput" placeholder="اكتب مهمة جديدة...">
        <button id="add-btn" onclick="addTask()">إضافة</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script>
    const taskInput = document.getElementById("taskInput");
    const taskList = document.getElementById("taskList");

    // 1. تحميل المهام من الذاكرة أول ما الصفحة تفتح
    document.addEventListener("DOMContentLoaded", getTasks);

    function addTask() {
        if (taskInput.value === '') {
            alert("اكتب حاجة يا محمد!");
            return;
        }

        const taskValue = taskInput.value;
        createTaskElement(taskValue);
        
        // 2. حفظ المهمة في الذاكرة
        saveLocalTasks(taskValue);

        taskInput.value = "";
    }

    function createTaskElement(text) {
        const li = document.createElement("li");
        li.innerHTML = `
            <span class="task-text" onclick="this.parentElement.classList.toggle('checked')">${text}</span>
            <span class="delete-btn" onclick="removeTask(this)">×</span>
        `;
        taskList.appendChild(li);
    }

    function removeTask(btn) {
        const taskItem = btn.parentElement;
        const taskText = taskItem.querySelector('.task-text').innerText;
        
        // مسح من الذاكرة
        removeLocalTasks(taskText);
        
        taskItem.remove();
    }

    // --- وظائف الـ Local Storage (المخزن السري) ---

    function saveLocalTasks(task) {
        let tasks = localStorage.getItem("tasks") ? JSON.parse(localStorage.getItem("tasks")) : [];
        tasks.push(task);
        localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function getTasks() {
        let tasks = localStorage.getItem("tasks") ? JSON.parse(localStorage.getItem("tasks")) : [];
        tasks.forEach(task => createTaskElement(task));
    }

    function removeLocalTasks(task) {
        let tasks = JSON.parse(localStorage.getItem("tasks"));
        const filteredTasks = tasks.filter(t => t !== task);
        localStorage.setItem("tasks", JSON.stringify(filteredTasks));
    }

    // الإضافة بـ Enter
    taskInput.addEventListener("keypress", (e) => { if (e.key === "Enter") addTask(); });
</script>

</body>
</html>
