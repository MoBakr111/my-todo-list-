<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مدير المهام اليومي</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --glass: rgba(26, 26, 38, 0.8);
            --accent: #6c63ff;
            --text: #e8e8f0;
            --sidebar-bg: #11111a;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Almarai', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 10% 20%, var(--accent), transparent 30%);
            background-attachment: fixed;
            color: var(--text); margin: 0; padding-top: 80px; overflow-x: hidden;
            display: flex; flex-direction: column; min-height: 100vh; transition: 0.3s;
        }

        /* الهيدر المحسن */
        .top-bar {
            position: fixed; top: 0; left: 0; width: 100vw; height: 60px;
            background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .menu-btn { font-size: 24px; cursor: pointer; color: var(--accent); background: none; border: none; }

        /* القائمة الجانبية */
        .sidebar {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100%;
            background: var(--sidebar-bg); z-index: 2000; transition: 0.3s ease;
            padding: 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.5); border-left: 1px solid rgba(255,255,255,0.05);
            overflow-y: auto;
        }
        .sidebar.open { right: 0; }
        .sidebar h3 { color: var(--accent); margin: 25px 0 10px 0; font-size: 0.9rem; border-bottom: 1px solid #333; padding-bottom: 5px; }

        /* الألوان المزدحمة */
        .theme-options { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        .dot { width: 30px; height: 30px; border-radius: 6px; cursor: pointer; border: 1.5px solid transparent; }

        /* تايمر التركيز */
        .focus-timer { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; text-align: center; margin: 10px 0; border: 1px solid rgba(255,255,255,0.05); }
        #timer-display { font-size: 1.8rem; font-weight: bold; color: var(--accent); display: block; margin-bottom: 10px; }
        .timer-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 15px; }
        .control-btn { background: rgba(255,255,255,0.1); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }
        .timer-btn { width: 100%; background: var(--accent); border: none; color: white; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 1500; display: none; }

        /* المحتوى الرئيسي */
        .container {
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            width: 92%; max-width: 400px; padding: 25px; border-radius: 24px;
            margin: 0 auto 20px auto; border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .date-badge { font-size: 11px; color: var(--accent); margin-bottom: 10px; display: block; text-align: center; opacity: 0.8; }
        
        /* عناوين قابلة للتعديل */
        .editable-title { cursor: pointer; transition: 0.3s; margin-top: 0; text-align: center; font-size: 1.2rem; }
        .editable-title:hover { color: var(--accent); }
        .editable-title::after { content: ' ✎'; font-size: 12px; opacity: 0.5; }

        .stats-bar { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; margin-bottom: 20px; text-align: center; font-size: 13px; }

        .input-box { display: flex; gap: 10px; margin-bottom: 25px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; outline: none; font-family: 'Almarai'; }
        button#add-btn { padding: 10px 15px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }

        ul { list-style: none; padding: 0; }
        li { background: rgba(255, 255, 255, 0.03); padding: 14px; margin-bottom: 10px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        li.checked span { text-decoration: line-through; opacity: 0.4; }
        .delete-btn { color: #ff6584; cursor: pointer; font-size: 1.2rem; }

        footer { margin-top: auto; padding: 20px; text-align: center; font-size: 11px; color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <span id="nav-title" onclick="editElementText('nav-title', 'اسم التطبيق')" style="font-weight: bold; cursor: pointer;">قائمة المهام</span>
        <div style="width: 35px;"></div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <h2 style="margin-top: 10px; font-size: 1.1rem;">إعداداتك الاحترافية 🛠️</h2>
        
        <h3>اختر لونك المفضل 🎨</h3>
        <div class="theme-options">
            <div class="dot" style="background:#6c63ff" onclick="changeTheme('#6c63ff')"></div>
            <div class="dot" style="background:#ff6584" onclick="changeTheme('#ff6584')"></div>
            <div class="dot" style="background:#00d2ff" onclick="changeTheme('#00d2ff')"></div>
            <div class="dot" style="background:#4caf50" onclick="changeTheme('#4caf50')"></div>
            <div class="dot" style="background:#ff9800" onclick="changeTheme('#ff9800')"></div>
            <div class="dot" style="background:#00bcd4" onclick="changeTheme('#00bcd4')"></div>
            <div class="dot" style="background:#9c27b0" onclick="changeTheme('#9c27b0')"></div>
            <div class="dot" style="background:#f44336" onclick="changeTheme('#f44336')"></div>
            <div class="dot" style="background:#795548" onclick="changeTheme('#795548')"></div>
            <div class="dot" style="background:#607d8b" onclick="changeTheme('#607d8b')"></div>
        </div>

        <h3>توقيت التركيز ⏱️</h3>
        <div class="focus-timer">
            <div class="timer-controls">
                <button class="control-btn" onclick="adjustTimer(-5)">-5</button>
                <span id="timer-display">25:00</span>
                <button class="control-btn" onclick="adjustTimer(5)">+5</button>
            </div>
            <button class="timer-btn" id="startTimer" onclick="startFocus()">بدأ الجلسة</button>
        </div>

        <h3>أدوات إضافية ⚙️</h3>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button onclick="checkNewDay(true)" style="background: rgba(108, 99, 255, 0.1); border: 1px solid var(--accent); color: white; padding: 10px; border-radius: 8px; cursor: pointer; font-family: 'Almarai';">🔄 تصفير ليوم جديد</button>
            <div style="display:flex; justify-content: space-between; align-items:center; font-size: 13px;">
                <span>الأصوات</span>
                <input type="checkbox" id="soundToggle" checked>
            </div>
        </div>

        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        <p style="font-size: 10px; color: #555;">Daily Planner Engine v5.0</p>
    </div>

    <div class="container">
        <span class="date-badge" id="currentDateDisplay">جاري التحميل...</span>
        <h2 class="editable-title" id="main-title" onclick="editElementText('main-title', 'العنوان الرئيسي')">ماذا ستنجز اليوم؟</h2>
        
        <div class="stats-bar" id="stats">أنجزت 0 من 0 مهام 🔥</div>
        
        <div class="input-box">
            <input type="text" id="taskInput" placeholder="أضف مهمة للآن...">
            <button id="add-btn" onclick="addTask()">إضافة</button>
        </div>
        <ul id="taskList"></ul>
    </div>

    <footer>Developed by Mohamed Abobakr Abdelfattah</footer>

    <script>
        const taskInput = document.getElementById("taskInput");
        const taskList = document.getElementById("taskList");
        const statsBar = document.getElementById("stats");
        const soundToggle = document.getElementById("soundToggle");

        // إدارة الأصوات
        const addSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        const deleteSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
        const checkSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2570/2570-preview.mp3');

        function playSfx(audio) { if(soundToggle.checked) { audio.pause(); audio.currentTime = 0; audio.play().catch(e=>{}); } }

        window.onload = () => {
            getTasks();
            updateStats();
            loadSettings();
            displayCurrentDate();
            checkNewDay(false);
        };

        // 1. عرض التاريخ اليومي
        function displayCurrentDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDateDisplay').innerText = new Date().toLocaleDateString('ar-EG', options);
        }

        // 2. فحص اليوم الجديد
        function checkNewDay(manual) {
            const today = new Date().toLocaleDateString();
            const lastDate = localStorage.getItem('lastOpenDate');

            if (manual || (lastDate && lastDate !== today)) {
                if (confirm(manual ? "هل تريد تصفير القائمة لبدء يوم جديد؟" : "أهلاً بك في يوم جديد! هل تريد مسح مهام الأمس وبدء قائمة جديدة؟")) {
                    localStorage.removeItem("tasks_v5");
                    taskList.innerHTML = "";
                    updateStats();
                }
            }
            localStorage.setItem('lastOpenDate', today);
        }

        // 3. تعديل النصوص بضغطة واحدة
        function editElementText(id, label) {
            let current = document.getElementById(id).innerText.replace(' ✎', '');
            let newVal = prompt(`تعديل ${label}:`, current);
            if(newVal) {
                document.getElementById(id).innerText = newVal;
                localStorage.setItem('saved_' + id, newVal);
            }
        }

        function toggleMenu() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            sb.classList.toggle('open');
            ov.style.display = sb.classList.contains('open') ? 'block' : 'none';
        }

        function changeTheme(color) {
            document.documentElement.style.setProperty('--accent', color);
            localStorage.setItem('themeColor', color);
        }

        // تايمر التركيز
        let timer;
        let baseMinutes = 25;
        let isRunning = false;

        function adjustTimer(amount) {
            if(isRunning) return;
            baseMinutes = Math.max(5, baseMinutes + amount);
            document.getElementById('timer-display').innerText = `${baseMinutes}:00`;
        }

        function startFocus() {
            const display = document.getElementById('timer-display');
            const btn = document.getElementById('startTimer');
            if (isRunning) { clearInterval(timer); isRunning = false; btn.innerText = "بدأ الجلسة"; display.innerText = `${baseMinutes}:00`; return; }

            let seconds = baseMinutes * 60;
            isRunning = true;
            btn.innerText = "إيقاف";
            timer = setInterval(() => {
                seconds--;
                let mins = Math.floor(seconds / 60);
                let secs = seconds % 60;
                display.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (seconds <= 0) { clearInterval(timer); isRunning = false; alert("انتهى وقت التركيز!"); btn.innerText = "بدأ الجلسة"; }
            }, 1000);
        }

        function loadSettings() {
            const color = localStorage.getItem('themeColor');
            if(color) changeTheme(color);
            ['nav-title', 'main-title'].forEach(id => {
                const val = localStorage.getItem('saved_' + id);
                if(val) document.getElementById(id).innerText = val;
            });
        }

        function updateStats() {
            const total = taskList.children.length;
            const done = document.querySelectorAll('li.checked').length;
            statsBar.innerText = `أنجزت ${done} من ${total} مهام ${done == total && total > 0 ? '🏆' : '🔥'}`;
        }

        function addTask() {
            const val = taskInput.value.trim();
            if (val === '') return;
            createTaskElement(val);
            saveLocal(val);
            playSfx(addSound);
            taskInput.value = "";
            updateStats();
        }

        function createTaskElement(text, isDone = false) {
            const li = document.createElement("li");
            if(isDone) li.classList.add('checked');
            li.innerHTML = `<span style="flex:1; cursor:pointer;" onclick="toggleCheck(this)">${text}</span><span class="delete-btn" onclick="removeT(this, '${text}')">×</span>`;
            taskList.appendChild(li);
        }

        function toggleCheck(el) {
            el.parentElement.classList.toggle('checked');
            playSfx(checkSound);
            updateStats();
            updateLocal();
        }

        function removeT(btn, text) {
            playSfx(deleteSound);
            btn.parentElement.remove();
            updateLocal();
            updateStats();
        }

        function updateLocal() {
            let tasks = [];
            document.querySelectorAll('li').forEach(li => {
                tasks.push({ text: li.querySelector('span').innerText, done: li.classList.contains('checked') });
            });
            localStorage.setItem("tasks_v5", JSON.stringify(tasks));
        }

        function saveLocal(t) {
            let tasks = localStorage.getItem("tasks_v5") ? JSON.parse(localStorage.getItem("tasks_v5")) : [];
            tasks.push({ text: t, done: false });
            localStorage.setItem("tasks_v5", JSON.stringify(tasks));
        }

        function getTasks() {
            let tasks = localStorage.getItem("tasks_v5") ? JSON.parse(localStorage.getItem("tasks_v5")) : [];
            tasks.forEach(t => createTaskElement(t.text, t.done));
        }

        taskInput.addEventListener("keypress", (e) => { if (e.key === "Enter") addTask(); });
    </script>
</body>
</html>
