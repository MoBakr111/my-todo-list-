<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة مهامي الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --glass: rgba(26, 26, 38, 0.8);
            --accent: #6c63ff;
            --text: #e8e8f0;
            --sidebar-bg: #11111a;
        }

        body {
            font-family: 'Almarai', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 10% 20%, rgba(108, 99, 255, 0.1) 0%, transparent 20%);
            color: var(--text); margin: 0; padding-top: 80px; overflow-x: hidden;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* --- تصليح الشريط العلوي --- */
        .top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: var(--glass); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000; box-sizing: border-box;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .menu-btn {
            font-size: 24px; cursor: pointer; color: var(--accent);
            background: none; border: none; padding: 5px;
        }

        /* --- القائمة الجانبية --- */
        .sidebar {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: var(--sidebar-bg); z-index: 2000; transition: 0.4s;
            padding: 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            border-left: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar.open { right: 0; }

        .sidebar h3 { color: var(--accent); margin-bottom: 30px; }
        .sidebar a {
            display: block; color: var(--text); text-decoration: none;
            padding: 12px; border-radius: 10px; margin-bottom: 10px; transition: 0.3s;
        }
        .sidebar a:hover { background: rgba(108, 99, 255, 0.1); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1500; display: none;
        }

        /* --- المحتوى --- */
        .container {
            background: var(--glass); backdrop-filter: blur(15px);
            width: 90%; max-width: 400px; padding: 30px; border-radius: 24px;
            margin: 0 auto 40px auto; border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-box { display: flex; gap: 10px; margin-bottom: 25px; }
        input {
            flex: 1; padding: 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); color: white; outline: none; font-family: 'Almarai';
        }

        button#add-btn {
            padding: 10px 20px; border-radius: 14px; border: none; background: var(--accent);
            color: white; font-weight: bold; cursor: pointer;
        }

        ul { list-style: none; padding: 0; }
        li {
            background: rgba(255, 255, 255, 0.03); padding: 16px; margin-bottom: 12px;
            border-radius: 16px; display: flex; justify-content: space-between; align-items: center;
        }
        li.checked span { text-decoration: line-through; opacity: 0.4; }
        .delete-btn { color: #ff6584; cursor: pointer; font-size: 1.3rem; }

        /* --- الفوتر (اسمك تحت) --- */
        footer {
            margin-top: auto; padding: 20px; text-align: center;
            font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <span style="font-weight: bold; font-size: 1.1rem;">قائمة المهام</span>
        <div style="width: 24px;"></div> </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <h3>القائمة ⚙️</h3>
        <a href="#" onclick="toggleMenu()">🏠 الرئيسية</a>
        <a href="#" onclick="clearAll()">🧹 مسح جميع المهام</a>
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        <p style="font-size: 12px; color: #555;">To-Do List v2.1</p>
    </div>

    <div class="container">
        <h2 style="text-align: center; margin-top: 0;">ماذا ستنجز اليوم؟ ✍️</h2>
        <div class="input-box">
            <input type="text" id="taskInput" placeholder="اكتب مهمة جديدة...">
            <button id="add-btn" onclick="addTask()">إضافة</button>
        </div>
        <ul id="taskList"></ul>
    </div>

    <footer>
        Developed by Mohamed Abobakr Abdelfattah
    </footer>

    <script>
        const taskInput = document.getElementById("taskInput");
        const taskList = document.getElementById("taskList");

        const addSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        const deleteSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
        const checkSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2570/2570-preview.mp3');

        function playSfx(audio) {
            audio.pause(); 
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Sound play error")); 
        }

        window.onload = getTasks;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            const overlay = document.getElementById('overlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        }

        function addTask() {
            const val = taskInput.value.trim();
            if (val === '') return;
            createTaskElement(val);
            saveLocal(val);
            playSfx(addSound);
            taskInput.value = "";
        }

        function createTaskElement(text) {
            const li = document.createElement("li");
            li.innerHTML = `
                <span style="flex:1; cursor:pointer;" onclick="toggleCheck(this)">${text}</span>
                <span class="delete-btn" onclick="removeT(this, '${text}')">×</span>
            `;
            taskList.appendChild(li);
        }

        function toggleCheck(el) {
            el.parentElement.classList.toggle('checked');
            playSfx(checkSound);
        }

        function removeT(btn, text) {
            playSfx(deleteSound);
            btn.parentElement.remove();
            let tasks = JSON.parse(localStorage.getItem("tasks"));
            tasks.splice(tasks.indexOf(text), 1);
            localStorage.setItem("tasks", JSON.stringify(tasks));
        }

        function saveLocal(t) {
            let tasks = localStorage.getItem("tasks") ? JSON.parse(localStorage.getItem("tasks")) : [];
            tasks.push(t);
            localStorage.setItem("tasks", JSON.stringify(tasks));
        }

        function getTasks() {
            let tasks = localStorage.getItem("tasks") ? JSON.parse(localStorage.getItem("tasks")) : [];
            tasks.forEach(t => createTaskElement(t));
        }

        function clearAll() {
            if(confirm("هل تريد مسح جميع المهام؟")) {
                localStorage.removeItem("tasks");
                taskList.innerHTML = "";
                toggleMenu();
            }
        }

        taskInput.addEventListener("keypress", (e) => { if (e.key === "Enter") addTask(); });
    </script>
</body>
</html>
